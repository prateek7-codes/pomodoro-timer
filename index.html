<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FocusFlow — Premium Pomodoro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-theme="light" data-mode="pomodoro">
    <div class="app-shell" id="appShell">
      <header class="top-nav" id="topNav">
        <div class="brand" aria-label="FocusFlow brand">
          <span class="brand__icon" aria-hidden="true">⚡</span>
          <span class="brand__name">FocusFlow</span>
        </div>
        <nav class="top-nav__menu" aria-label="Main navigation">
          <button class="nav-link" id="statsButton" type="button">Stats</button>
          <button class="nav-link" id="settingsButton" type="button">Settings</button>
          <button
            class="theme-toggle"
            id="themeToggle"
            type="button"
            role="switch"
            aria-checked="false"
            aria-label="Toggle dark mode"
          >
            <span class="theme-toggle__thumb"></span>
          </button>
        </nav>
      </header>

      <main class="focus-main" id="focusMain">
        <section class="timer-card" aria-labelledby="timerTitle">
          <h1 class="sr-only" id="timerTitle">FocusFlow Pomodoro Timer</h1>

          <div class="timer-wrap" id="timerWrap">
            <svg class="timer-ring" viewBox="0 0 240 240" aria-hidden="true">
              <defs>
                <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="var(--ring-start)" />
                  <stop offset="100%" stop-color="var(--ring-end)" />
                </linearGradient>
              </defs>
              <circle class="timer-ring__track" cx="120" cy="120" r="104"></circle>
              <circle
                class="timer-ring__progress"
                id="progressCircle"
                cx="120"
                cy="120"
                r="104"
              ></circle>
            </svg>
            <div class="timer-content">
              <p class="mode-label" id="modeLabel">Pomodoro</p>
              <p class="timer-display" id="timerDisplay" aria-live="polite">25:00</p>
            </div>
          </div>

          <div class="mode-switch" role="tablist" aria-label="Timer mode">
            <button class="mode-switch__option is-active" data-mode="pomodoro" role="tab" type="button">
              Pomodoro
            </button>
            <button class="mode-switch__option" data-mode="shortBreak" role="tab" type="button">
              Short Break
            </button>
            <button class="mode-switch__option" data-mode="longBreak" role="tab" type="button">
              Long Break
            </button>
          </div>

          <div class="actions">
            <button class="button button--primary" id="startPauseButton" type="button">Start</button>
            <button class="button button--ghost" id="resetButton" type="button">Reset</button>
          </div>
        </section>

        <section class="insights" aria-label="Productivity insights">
          <p class="insight" id="focusTimeText">You’ve focused for 0m today.</p>
          <p class="insight" id="sessionsText">Sessions completed: 0</p>
          <p class="insight" id="streakText">Daily streak: 0 days</p>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="assertive" aria-hidden="true">
        <p id="toastMessage">Session complete.</p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
